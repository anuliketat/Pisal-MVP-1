name: fin_alert
description: Gmail transaction ingestion MVP — SQLite + atomic CSV export + icon tagging.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  csv: ^6.0.0
  crypto: ^3.0.3
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^2.6.1
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  http: ^1.2.2
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
